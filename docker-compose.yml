services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: imagesdb
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql

  app:
    build: .
    ports:
      - '3000:3000'
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: imagesdb
    depends_on:
      - postgres

volumes:
  postgres_data:
